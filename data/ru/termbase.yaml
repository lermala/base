# Terminology glossary

- term: API
  definition: "Интерфейс, через который программы взаимодействуют друг с другом"

- term: Backend
  definition: "Серверная часть приложения"

- term: Frontend
  definition: "Клиентская часть приложения"

- term: Артефакты
  definition: "Физические носители информации, подтверждающие договорённости и позволяющие отслеживать ход проекта: договоры, КП, ТЗ, документы, исполняемые файлы, исходный код, веб-страницы и данные. Универсального набора артефактов не существует."

- term: Коммерческое предложение
  abbr: КП
  definition: "Документ, с помощью которого компания презентует себя и предлагает товар, услугу или сотрудничество."

- term: Нотация
  abbr: notation
  definition: "Система условных знаков и правил их использования для описания объектов, процессов и взаимосвязей. Примеры: BPMN 2.0, EPC, IDEF0, нотация Чена."

- term: Стейкхолдер
  abbr: stakeholder
  definition: "Лицо, имеющее интерес к проекту или организации либо влияющее на них."

- term: Эпик
  abbr: epic
  definition: "Крупный объём работы, который разбивается на более мелкие задачи или пользовательские истории."

- term: BPM
  definition: "Концепция управления организацией как совокупностью бизнес-процессов с использованием IT-инструментов и нотации BPMN."

- term: BPMS
  abbr: BPM-система
  definition: "Класс IT-систем для моделирования, исполнения, контроля и оптимизации бизнес-процессов. Примеры: DirectumX, Elma365, Битрикс24, Naumen BPM."

- term: CRM
  definition: "Программа для управления и автоматизации взаимодействия с клиентами. Примеры: Битрикс24, AmoCRM."

- term: Data Warehouse
  abbr: DWH
  definition: "Хранилище исторических данных, агрегирующее информацию из различных систем в структурированном виде."

- term: ERP
  definition: "Система управления ресурсами предприятия, объединяющая данные о ключевых бизнес-процессах: продажи, финансы, производство, склад, HR и др."

- term: QM-система
  definition: "Система управления качеством. Пример: SAP QM."