---
# Terminology glossary

- term: API
  definition: "Интерфейс, через который программы взаимодействуют друг с другом"

- term: Backend
  definition: "Серверная часть приложения"

- term: Frontend
  definition: "Клиентская часть приложения"

- term: Артефакты
  definition: "Физические носители информации, подтверждающие договорённости и позволяющие отслеживать ход проекта: договоры, КП, ТЗ, документы, исполняемые файлы, исходный код, веб-страницы и данные. Универсального набора артефактов не существует."

- term: Коммерческое предложение
  abbr: КП
  definition: "Документ, с помощью которого компания презентует себя и предлагает товар, услугу или сотрудничество."

- term: Нотация
  abbr: notation
  definition: "Система условных знаков и правил их использования для описания объектов, процессов и взаимосвязей. Примеры: BPMN 2.0, EPC, IDEF0, нотация Чена."

- term: Стейкхолдер
  abbr: stakeholder
  definition: "Лицо, имеющее интерес к проекту или организации либо влияющее на них."

- term: Эпик
  abbr: epic
  definition: "Крупный объём работы, который разбивается на более мелкие задачи или пользовательские истории."

- term: BPM
  definition: "Концепция управления организацией как совокупностью бизнес-процессов с использованием IT-инструментов и нотации BPMN."

- term: BPMS
  abbr: BPM-система
  definition: "Класс IT-систем для моделирования, исполнения, контроля и оптимизации бизнес-процессов. Примеры: DirectumX, Elma365, Битрикс24, Naumen BPM."

- term: CRM
  definition: "Программа для управления и автоматизации взаимодействия с клиентами. Примеры: Битрикс24, AmoCRM."

- term: Data Warehouse
  abbr: DWH
  definition: "Хранилище исторических данных, агрегирующее информацию из различных систем в структурированном виде."

- term: ERP
  definition: "Система управления ресурсами предприятия, объединяющая данные о ключевых бизнес-процессах: продажи, финансы, производство, склад, HR и др."

- term: QM-система
  definition: "Система управления качеством. Пример: SAP QM."

- term: CASE-инструменты 
  definition: "Инструменты, которые используются в области разработки программного обеспечения. Сокращение CASE — Computer-Aided Software Engineering («компьютерно-поддерживаемая инженерия программного обеспечения»). "

- term: ER-диаграммы
  abbr: ERD
  definition: ERD (Entity-Relationship diagram, диаграмма отношений сущностей) используется для визуального представления баз данных и показывает, как элементы в базе данных связаны друг с другом. ERD состоит из двух типов объектов - сущностей и отношений. 

- term: Базовая версия требований
  abbr: baseline
  definition: Набор требований, согласованный заинтересованными лицами и часто определяющий содержимое определенной итерации разработки. 

- term: Система управления требованиями
  abbr: СУТр, RMS
  definition: Программные продукты или приложения, которые помогают собирать требования, фиксировать их, систематизировать, выделять приоритетные и строить взаимосвязи. 

- term: docs-as-code
  definition: "Docs-as-Code («документация как код») — это подход к созданию и поддержке документации, при котором документация разрабатывается так же, как программный код. Это означает использование тех же инструментов, процессов и практик, что и при разработке ПО: системы контроля версий, pull-запросы, автоматическое тестирование, CI/CD и текстовые форматы вроде .md или .rst"

- term: backlog
  abbr: бэклог
  definition: Backlog, или бэклог, — это список задач, идей, требований и изменений в проекте.

- term: Матрица трассировки требований
  abbr: RTM
  definition: Матрица трассировки требований (Requirements Traceability Matrix, RTM) — это табличный документ, который связывает требования проекта с тестовыми сценариями. Он показывает команде, какие требования покрыты тестами и какие тесты соответствуют конкретным требованиям. 

- term: Запрос на изменение
  abbr: ЗнИ
  definition: Запрос на изменение – это предложение об усовершенствовании продукта, выраженное в виде записи в системе отслеживания запросов на изменения. В англоязычных источниках такие запросы называются change request (CR).

- term: Совет по управлению изменениями
  abbr: CCB
  definition: Совет по управлению изменениями (change control board, CCB) — это группа людей, независимо от того, сколько их — один человек или несколько, принимающие решение о том, какие предложенные изменения требований и новые требования принять как есть или с корректировками, и от каких отказаться. 
